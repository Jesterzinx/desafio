<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVER</title>

<style>
    body {
        background: black;
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        transition: 0.5s;
    }

    .claro {
        background: white;
        color: black;
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 20px;
        cursor: pointer;
        border-radius: 10px;
        border: none;
    }
</style>
</head>

<body>

<p class="texto">Amor eu amo você 🤍</p>

<button onclick="mudarTema()">🌙</button>

<script>
function mudarTema() {
    document.body.classList.toggle("claro");

    let botao = document.querySelector("button");

    if (botao.innerHTML === "🌞") {
        botao.innerHTML = "🌙";
    } else {
        botao.innerHTML = "🌞";
    }

    // redireciona pro link
    window.location.href = "https://www.youtube.com/watch?v=HbIC6c3p3Qo&list=RDHbIC6c3p3Qo&start_radio=1";
}
</script>

</body>
</html>
